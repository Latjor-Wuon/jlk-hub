<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JLN Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --orange: #E8631A;
            --orange-light: #FF8C42;
            --orange-pale: #FFF3EA;
            --dark: #1a1a2e;
            --gray: #6b7280;
            --border: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--orange-pale);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top:0; z-index:100;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .nav-logo-icon {
            width:38px; height:38px;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            border-radius: 9px;
            display:flex; align-items:center; justify-content:center;
            color:white; font-size:1.1rem;
        }
        .nav-logo-text { font-size:1.2rem; font-weight:700; color:var(--dark); }
        .nav-logo-text span { color:var(--orange); }
        .nav-back {
            display:flex; align-items:center; gap:6px;
            color:var(--gray); text-decoration:none; font-size:0.9rem; font-weight:500;
            padding: 6px 14px; border-radius:50px; border:1.5px solid var(--border);
            transition:all .2s;
        }
        .nav-back:hover { color:var(--orange); border-color:var(--orange); }
        /* Main layout */
        .auth-layout {
            flex:1; display:grid;
            grid-template-columns: 1fr 1fr;
        }
        /* Left panel */
        .auth-panel-left {
            background: linear-gradient(145deg, var(--orange) 0%, var(--orange-light) 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        .auth-panel-left::before {
            content:'';
            position:absolute;
            width:300px; height:300px;
            background: rgba(255,255,255,0.08);
            border-radius:50%;
            top:-100px; right:-80px;
        }
        .auth-panel-left::after {
            content:'';
            position:absolute;
            width:200px; height:200px;
            background: rgba(255,255,255,0.06);
            border-radius:50%;
            bottom:-60px; left:-60px;
        }
        .auth-brand {
            text-align:center;
            color:white;
            position:relative; z-index:1;
        }
        .auth-brand-icon {
            width:80px; height:80px;
            background:rgba(255,255,255,0.2);
            border-radius:20px;
            display:flex; align-items:center; justify-content:center;
            font-size:2.5rem;
            margin: 0 auto 1.5rem;
            backdrop-filter:blur(8px);
        }
        .auth-brand h1 { font-size:2rem; font-weight:800; margin-bottom:0.5rem; }
        .auth-brand p { font-size:1rem; opacity:0.88; line-height:1.6; max-width:300px; }
        .auth-brand-stats {
            display:flex; gap:2rem; margin-top:2.5rem;
            padding-top:2rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .abs { text-align:center; }
        .abs strong { display:block; font-size:1.5rem; font-weight:800; }
        .abs span { font-size:0.8rem; opacity:0.8; }
        /* Right panel */
        .auth-panel-right {
            display:flex; align-items:center; justify-content:center;
            padding: 3rem 2rem;
            background:white;
        }
        .auth-card {
            width:100%; max-width:420px;
        }
        .auth-card-header { margin-bottom:2rem; }
        .auth-card-header h2 {
            font-size:1.75rem; font-weight:800; color:var(--dark); margin-bottom:0.4rem;
        }
        .auth-card-header p { color:var(--gray); font-size:0.95rem; }
        /* Form */
        .form-group { margin-bottom:1.25rem; }
        .form-group label {
            display:block;
            font-size:0.88rem; font-weight:600; color:var(--dark);
            margin-bottom:0.4rem;
        }
        .form-group input {
            width:100%;
            padding:0.75rem 1rem;
            border:1.5px solid var(--border);
            border-radius:10px;
            font-size:0.95rem;
            color:var(--dark);
            transition:all .2s;
            outline:none;
        }
        .form-group input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232,99,26,0.1);
        }
        .form-input-icon { position:relative; }
        .form-input-icon i {
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:var(--gray); font-size:0.9rem;
        }
        .form-input-icon input { padding-left:2.5rem; }
        .form-pwd-toggle {
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; color:var(--gray);
            font-size:0.9rem;
        }
        .btn-auth {
            width:100%;
            padding:0.85rem;
            background: var(--orange);
            color:white;
            border:none;
            border-radius:50px;
            font-size:1rem; font-weight:700;
            cursor:pointer;
            transition:all .25s;
            margin-top:0.5rem;
        }
        .btn-auth:hover {
            background:var(--dark);
            transform:translateY(-1px);
            box-shadow:0 6px 20px rgba(232,99,26,.25);
        }
        .error-message {
            background:#fef2f2; color:#dc2626;
            padding:0.75rem 1rem; border-radius:8px;
            font-size:0.88rem; margin-bottom:1rem;
            border:1px solid #fecaca;
            display:none;
        }
        .auth-footer {
            text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--gray);
        }
        .auth-footer a { color:var(--orange); font-weight:600; text-decoration:none; }
        .auth-footer a:hover { text-decoration:underline; }
        .auth-divider {
            display:flex; align-items:center; gap:1rem;
            margin:1.25rem 0; color:var(--gray); font-size:0.85rem;
        }
        .auth-divider::before, .auth-divider::after {
            content:''; flex:1; height:1px; background:var(--border);
        }
        .btn-guest {
            width:100%;
            padding:0.75rem;
            background:white;
            color:var(--dark);
            border:1.5px solid var(--border);
            border-radius:50px;
            font-size:0.95rem; font-weight:600;
            cursor:pointer;
            transition:all .2s;
            display:flex; align-items:center; justify-content:center; gap:8px;
            text-decoration:none;
        }
        .btn-guest:hover { border-color:var(--orange); color:var(--orange); }
        @media (max-width:768px) {
            .auth-layout { grid-template-columns:1fr; }
            .auth-panel-left { display:none; }
            .auth-panel-right { padding:2rem 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/landing.html" class="nav-logo">
            <div class="nav-logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <span class="nav-logo-text">JLN <span>Hub</span></span>
        </a>
        <a href="/landing.html" class="nav-back">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </nav>

    <div class="auth-layout">
        <!-- Left Brand Panel -->
        <div class="auth-panel-left">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i class="fas fa-graduation-cap"></i></div>
                <h1>Welcome Back!</h1>
                <p>Sign in to continue your learning journey with South Sudan's leading education platform.</p>
                <div class="auth-brand-stats">
                    <div class="abs"><strong>12+</strong><span>Subjects</span></div>
                    <div class="abs"><strong>500+</strong><span>Lessons</span></div>
                    <div class="abs"><strong>2K+</strong><span>Students</span></div>
                </div>
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="auth-panel-right">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h2>Sign In</h2>
                    <p>Access your learning dashboard</p>
                </div>

                <div id="login-error" class="error-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <div class="form-input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="login-username" name="username" placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="form-input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="form-pwd-toggle" id="pwd-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="auth-divider">or</div>

                <a href="/home.html" class="btn-guest">
                    <i class="fas fa-user-secret"></i> Continue as Guest
                </a>

                <div class="auth-footer">
                    Don't have an account? <a href="/pages/register.html">Sign up free</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/components/auth.js"></script>
    <script type="module">
        import { initCommon } from '/static/utils/common.js';
        initCommon();

        // Password toggle
        document.getElementById('pwd-toggle').addEventListener('click', function() {
            const input = document.getElementById('login-password');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        const authManager = window.AuthManager ? new window.AuthManager() : null;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';

            if (!authManager) {
                errorEl.textContent = 'Authentication system not available.';
                errorEl.style.display = 'block';
                return;
            }

            const result = await authManager.login(username, password);
            if (result.success) {
                window.location.href = '/home.html';
            } else {
                errorEl.textContent = result.error || 'Login failed. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
